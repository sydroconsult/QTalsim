name: Security scan

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      # required for all workflows
      security-events: write
      # only required for workflows in private repositories
      actions: read
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Perform Bandit Analysis
      uses: PyCQA/bandit-action@v1